<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SwapProject</title>
    <style>
        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        p {
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .game {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            width: 300px;
        }

        .game h2 {
            margin: 0 0 10px 0;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <h1>SwapProject</h1>
    <p>Mobile games developer</p>

    <div class="game">
        <h2>Crystal Rush</h2>
        <p>Match-3 puzzle game with unique mechanics and bosses.</p>
        <a href="#">View in App Store</a>
    </div>

    <div class="game">
        <h2>WordOut</h2>
        <p>Fun party word game for friends.</p>
        <a href="#">View in App Store</a>
    </div>

</body>
</html>
